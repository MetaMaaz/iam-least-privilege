name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check analyzer cli.py

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke-test the pipeline on the mock account
        run: |
          python cli.py analyze --in data/mock_account.json
          python cli.py report  --in data/mock_account.json --out /tmp/report
          test -f /tmp/report/report.md
